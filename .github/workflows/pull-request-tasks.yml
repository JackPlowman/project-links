name: "Pull Request Tasks"

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions: {}

jobs:
  common-pull-request-tasks:
    name: Common Pull Request Tasks
    permissions:
      pull-requests: write
    uses: JackPlowman/reusable-workflows/.github/workflows/common-pull-request-tasks.yml@248e14987652d9507c9ed16ad7fcd16d170afb66 # v2026.03.28.01
    secrets:
      workflow_github_token: ${{ secrets.GITHUB_TOKEN }}
