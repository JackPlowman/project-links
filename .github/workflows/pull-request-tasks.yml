name: "Pull Request Tasks"

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions: {}

jobs:
  common-pull-request-tasks:
    name: Common Pull Request Tasks
    permissions:
      pull-requests: write
    uses: JackPlowman/reusable-workflows/.github/workflows/common-pull-request-tasks.yml@a69e45a3f90bb2372d7851e569c5d54c3028ebe0 # v2026.02.27.01
    secrets:
      workflow_github_token: ${{ secrets.GITHUB_TOKEN }}
